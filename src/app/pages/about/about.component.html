<!-- En-tête de page -->
<section class="page-header">
  <div class="container">
    <h1 class="page-header__title" appReveal="fade-up" [revealDelay]="200">{{ texts.title }}</h1>
    <p class="page-header__subtitle" appReveal="fade-up" [revealDelay]="350">{{ texts.subtitle }}</p>
    <div appReveal="fade-up" [revealDelay]="450">
      <hr class="divider-animated">
    </div>
  </div>
</section>

<!-- Histoire -->
<section class="story section">
  <div class="container">
    <div class="story__layout">
      <div class="story__image-wrapper" appReveal="fade-right">
        <div class="story__image" role="img" aria-label="Préparation de pizza au feu de bois"></div>
      </div>
      <div class="story__content">
        <h2 class="story__title" appReveal="fade-left">{{ texts.storyTitle }}</h2>
        @for (paragraph of texts.storyText; track $index) {
          <p class="story__text" appReveal="fade-left" [revealDelay]="$index * 150">{{ paragraph }}</p>
        }
      </div>
    </div>
  </div>
</section>

<!-- Valeurs -->
<section class="values section section--alt">
  <div class="container">
    <h2 class="section__title" appReveal="fade-up">{{ texts.valuesTitle }}</h2>
    <div appReveal="fade-up" [revealDelay]="150">
      <hr class="divider-animated">
    </div>
    <div class="values__grid">
      @for (value of texts.values; track value.title; let i = $index) {
        <div class="values__card hover-glow shimmer" appReveal="fade-up" [revealDelay]="i * 150">
          <h3 class="values__card-title">{{ value.title }}</h3>
          <p class="values__card-text">{{ value.text }}</p>
        </div>
      }
    </div>
  </div>
</section>
