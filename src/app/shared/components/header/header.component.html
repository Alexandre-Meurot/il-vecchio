<header class="header" [class.header--scrolled]="scrolled()">
  <div class="header__inner container">
    <!-- Logo -->
    <a routerLink="/" class="header__logo" (click)="closeMenu()">
      {{ siteName }}
    </a>

    <!-- Navigation desktop -->
    <nav class="header__nav" aria-label="Navigation principale">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ texts.home }}
      </a>
      <a routerLink="/la-carte" routerLinkActive="active">
        {{ texts.menu }}
      </a>
      <a routerLink="/notre-histoire" routerLinkActive="active">
        {{ texts.about }}
      </a>
      <a routerLink="/contact" routerLinkActive="active">
        {{ texts.contact }}
      </a>
    </nav>

    <!-- CTA téléphone + Facebook -->
    <div class="header__actions">
      @if (facebookUrl) {
        <a [href]="facebookUrl" target="_blank" rel="noopener noreferrer" aria-label="Facebook" class="header__social">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </a>
      }
      <a [href]="'tel:' + phone" class="header__cta btn btn--primary">
        {{ texts.cta }}
      </a>
    </div>

    <!-- Bouton hamburger mobile -->
    <button
      class="header__burger"
      [class.header__burger--open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Menu de navigation"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Menu mobile -->
  <div class="header__mobile" [class.header__mobile--open]="menuOpen()">
    <nav class="header__mobile-nav" aria-label="Navigation mobile">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        {{ texts.home }}
      </a>
      <a routerLink="/la-carte" routerLinkActive="active" (click)="closeMenu()">
        {{ texts.menu }}
      </a>
      <a routerLink="/notre-histoire" routerLinkActive="active" (click)="closeMenu()">
        {{ texts.about }}
      </a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">
        {{ texts.contact }}
      </a>
      <a [href]="'tel:' + phone" class="header__mobile-cta btn btn--primary" (click)="closeMenu()">
        {{ phoneDisplay }}
      </a>
      @if (facebookUrl) {
        <a [href]="facebookUrl" target="_blank" rel="noopener noreferrer" class="header__mobile-social" (click)="closeMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </a>
      }
    </nav>
  </div>
</header>
